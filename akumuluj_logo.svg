<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="36" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Outer background = body background #07080D -->
  <rect width="96" height="96" fill="#07080D"/>

  <!-- ═══ COMPASS RING (inset:0, size:96x96) ═══ -->
  <circle cx="48" cy="48" r="44" stroke="url(#ringGrad)" stroke-width="0.75"/>

  <!-- N gold -->
  <polygon points="48,3  51.5,14  48,17  44.5,14" fill="#C9A84C" opacity="0.95"/>
  <!-- S dim -->
  <polygon points="48,93  51.5,82  48,79  44.5,82" fill="#C9A84C" opacity="0.15"/>
  <!-- E dim -->
  <polygon points="93,48  82,51.5  79,48  82,44.5" fill="#C9A84C" opacity="0.15"/>
  <!-- W dim -->
  <polygon points="3,48  14,51.5  17,48  14,44.5" fill="#C9A84C" opacity="0.15"/>

  <!-- NE accent -->
  <polygon points="79,17  76,22  73,17  76,12" fill="#C9A84C" opacity="0.4" transform="rotate(45 76 17)"/>
  <!-- NW -->
  <polygon points="17,17  20,22  23,17  20,12" fill="#C9A84C" opacity="0.08" transform="rotate(-45 20 17)"/>
  <!-- SE -->
  <polygon points="79,79  76,74  73,79  76,84" fill="#C9A84C" opacity="0.08" transform="rotate(-45 76 79)"/>
  <!-- SW -->
  <polygon points="17,79  20,74  23,79  20,84" fill="#C9A84C" opacity="0.08" transform="rotate(45 20 79)"/>

  <!-- Inner thin ring -->
  <circle cx="48" cy="48" r="36" stroke="#C9A84C" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Center dots -->
  <circle cx="48" cy="48" r="2" fill="#C9A84C" fill-opacity="0.25"/>
  <circle cx="48" cy="48" r="1" fill="#C9A84C" fill-opacity="0.6"/>

  <!-- ═══ INNER CIRCLE (inset:18px → x=18,y=18, width=60,height=60, radius=30) ═══ -->
  <!-- background: var(--deep) = #0D0F1A, border: rgba(200,205,216,0.15) -->
  <circle cx="48" cy="48" r="30" fill="#0D0F1A"/>
  <circle cx="48" cy="48" r="30" stroke="#C8CDD8" stroke-opacity="0.15" stroke-width="1"/>

  <!-- ═══ CHART (svg width=48 height=38 viewBox="0 0 44 38") ═══ -->
  <!-- Centered in inner circle: cx=48,cy=48 -->
  <!-- x offset = 48 - 48/2 = 24, y offset = 48 - 38/2 = 29 -->
  <!-- scale: 48/44 = 1.0909 horizontal, 38/38 = 1.0 vertical -->
  <g transform="translate(24, 29) scale(1.0909, 1)">
    <polyline
      points="3,32  10,21  17,26  24,15  31,20  38,9"
      stroke="url(#lineGrad)"
      stroke-width="1.65"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <polygon
      points="35.05,7.12  42.03,2.67  40.95,10.88"
      fill="#C9A84C"
      shape-rendering="geometricPrecision"
    />
  </g>
</svg>
